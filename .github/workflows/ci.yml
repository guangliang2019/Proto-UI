name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/v0-release-prep

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@8.13.1 --activate
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -s check:types

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@8.13.1 --activate
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -s test
